<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Juan Diaz — Full-Stack Developer</title>
    <meta name="description" content="Portfolio of Juan Diaz — Full-Stack Web Developer building modern web experiences." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <!-- Language Toggle -->
    <button id="lang-toggle" class="lang-toggle" aria-label="Switch language">
      <span class="lang-flag">ES</span>
    </button>

    <!-- Scanline overlay -->
    <div class="scanlines" aria-hidden="true"></div>

    <!-- Floating grid background -->
    <div class="grid-bg" aria-hidden="true"></div>

    <!-- ═══════════════ HERO ═══════════════ -->
    <section id="hero">
      <div class="hero-content">
        <div class="terminal-window">
          <div class="terminal-bar">
            <span class="terminal-dot red"></span>
            <span class="terminal-dot yellow"></span>
            <span class="terminal-dot green"></span>
            <span class="terminal-title">juan@portfolio ~ $</span>
          </div>
          <div class="terminal-body">
            <div class="terminal-line">
              <span class="prompt">&gt;</span>
              <span id="typed-text" class="typed"></span>
              <span class="cursor">_</span>
            </div>
          </div>
        </div>
        <h1 class="hero-name" data-scramble>Juan <span class="accent-text" data-scramble>Diaz</span></h1>
        <p class="hero-title" data-i18n="heroTitle" data-scramble-title>Full-Stack Web Developer</p>
        <div class="hero-tags">
          <span class="hero-tag">JavaScript</span>
          <span class="hero-tag">React</span>
          <span class="hero-tag">Node.js</span>
          <span class="hero-tag">Express</span>
          <span class="hero-tag">Python</span>
        </div>
      </div>
      <a href="#projects" class="scroll-indicator" aria-label="Scroll to projects">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M7 13l5 5 5-5M7 6l5 5 5-5"/>
        </svg>
      </a>
    </section>

    <!-- ═══════════════ PROJECTS ═══════════════ -->
    <section id="projects">
      <div class="section-header reveal">
        <div class="section-label">
          <span class="label-line"></span>
          <span class="label-text" data-i18n="projectsLabel">Projects</span>
          <span class="label-line"></span>
        </div>
        <h2 class="section-title" data-i18n="projectsTitle">What I've Built</h2>
        <p class="section-subtitle" data-i18n="projectsSubtitle">Live websites — click any card to explore</p>
      </div>
      <div id="projects-grid" class="projects-grid"></div>
    </section>

    <!-- ═══════════════ DETAIL MODAL ═══════════════ -->
    <div id="detail-modal" class="modal-overlay" aria-hidden="true">
      <div class="modal-content">
        <button id="modal-close" class="modal-close" aria-label="Close">&times;</button>
        <div id="modal-preview" class="modal-preview"></div>
        <div id="modal-info" class="modal-info"></div>
      </div>
    </div>

    <!-- ═══════════════ CONTACT ═══════════════ -->
    <section id="contact">
      <div class="section-header reveal">
        <div class="section-label">
          <span class="label-line"></span>
          <span class="label-text" data-i18n="contactLabel">Contact</span>
          <span class="label-line"></span>
        </div>
        <h2 class="section-title" data-i18n="contactTitle">Let's Connect</h2>
      </div>
      <div class="contact-cards reveal">
        <a href="mailto:JuanDiaz5673@Gmail.com" class="contact-card">
          <div class="contact-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
          </div>
          <span class="contact-label" data-i18n="emailLabel">Email</span>
          <span class="contact-value">JuanDiaz5673@Gmail.com</span>
        </a>
        <a href="tel:+13475929221" class="contact-card">
          <div class="contact-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
          </div>
          <span class="contact-label" data-i18n="phoneLabel">Phone</span>
          <span class="contact-value">(347) 592-9221</span>
        </a>
      </div>
    </section>

    <!-- ═══════════════ FOOTER ═══════════════ -->
    <footer id="footer">
      <div class="footer-line"></div>
      <p class="footer-text">
        <span data-i18n="builtBy">Built by</span> <span class="accent-text">Juan Diaz</span> &copy; <span id="year"></span>
      </p>
    </footer>
  </body>
</html>
